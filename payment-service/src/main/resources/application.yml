spring:
  application:
    name: payment-service
  datasource:
    url: ${DB_PAYMENT_URL:jdbc:postgresql://localhost:5436/payment_db}
    username: ${POSTGRES_USERNAME:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: payment-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  cloud:
    openfeign:
      client:
        config:
          booking-service:
            connect-timeout: 2000
            read-timeout: 5000

server:
  port: 3006

# JWT — HS256, validate only (re-validate forwarded Bearer token via common-security JwtUtil).
# No default so startup fails fast if missing; JWT_SECRET is shared in root .env.
jwt:
  secret: ${JWT_SECRET}

app:
  payment:
    # Countdown / hold window for an unpaid payment. Kept equal to booking-service hold-minutes
    # so the booking hold and its payment expire together (15 min — a slow bank transfer + a
    # non-technical payer routinely exceed 10; a still-late proof is salvaged, see submitProof).
    expire-minutes: ${PAYMENT_EXPIRE_MINUTES:15}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

# Cloudinary — proof image upload for payment screenshots.
# Empty defaults so the service boots without keys; CloudinaryService degrades to a placeholder URL.
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}

resilience4j:
  circuitbreaker:
    instances:
      redis:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3

management:
  endpoints:
    web:
      exposure:
        include: health,info
